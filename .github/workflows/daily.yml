name: Daily Math Research Radar

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint and Format Code
        run: |
          ruff check .
          ruff format --check .

      - name: Run Unit Tests
        run: |
          pytest

      - name: Run pipeline
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add all tracked directories including the new cache to persist deduplication state
          git add papers/ stats/ README.md docs/ cache/
          
          if ! git diff --staged --quiet; then
            git commit -m "chore(bot): daily radar data and dashboard update [skip ci]"
            git push
            echo "Changes committed and pushed successfully."
          else
            echo "No new papers or changes to commit."
          fi