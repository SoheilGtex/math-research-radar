services:
  # --------------------------------------------------------
  # Core Data Extraction Pipeline
  # --------------------------------------------------------
  radar-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: math-research-radar:latest
    container_name: radar_engine
    # The pipeline is a batch job that runs and exits. 
    # It should not be restarted automatically upon completion.
    restart: "no"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_ENV=production
    volumes:
      # Bind mounts to persist generated data onto the host machine
      - ./papers:/app/papers
      - ./stats:/app/stats
      - ./docs:/app/docs
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./README.md:/app/README.md
    networks:
      - radar_network

